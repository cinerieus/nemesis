---
- name: Install security packages via pacman
  ansible.builtin.pacman:
    name: "{{ security_packages }}"
    state: present
    update_cache: true
  become: true

- name: Check if AUR packages are already installed
  ansible.builtin.shell: "pacman -Qi {{ item }} > /dev/null 2>&1"
  register: aur_check
  loop: "{{ security_packages_aur }}"
  changed_when: false
  failed_when: false

- name: Install AUR packages via paru
  ansible.builtin.shell: >
    su - {{ username }} -c 'paru -S --noconfirm --needed {{ item.item }}'
  loop: "{{ aur_check.results }}"
  when: item.rc != 0
  become: true
  changed_when: true
