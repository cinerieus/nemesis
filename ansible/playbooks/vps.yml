---
- name: Configure Nemesis VPS
  hosts: all
  become: true
  gather_facts: true

  roles:
    - role: base
    - role: shell
    - role: ssh
    - role: security_tools
    - role: firewall
    - role: hardening
    - role: vpn
      when: zerotier_network_id | default('') | length > 0
    - role: updates
