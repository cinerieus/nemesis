---
- name: Install openssh
  ansible.builtin.pacman:
    name: openssh
    state: present

- name: Deploy sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart sshd

- name: Ensure .ssh directory exists for user
  ansible.builtin.file:
    path: "/home/{{ username }}/.ssh"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0700"

- name: Deploy authorized_keys from config directory
  ansible.builtin.copy:
    src: "{{ config_dir }}/ssh/authorized_keys"
    dest: "/home/{{ username }}/.ssh/authorized_keys"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0600"

- name: Append additional SSH public keys
  ansible.builtin.lineinfile:
    path: "/home/{{ username }}/.ssh/authorized_keys"
    line: "{{ item }}"
    create: true
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0600"
  loop: "{{ ssh_public_keys }}"
  when: ssh_public_keys | length > 0

- name: Deploy authorized_keys for root (VPS)
  ansible.builtin.copy:
    src: "{{ config_dir }}/ssh/authorized_keys"
    dest: /root/.ssh/authorized_keys
    owner: root
    group: root
    mode: "0600"
  when: ssh_permit_root_login != "no"

- name: Generate SSH host keys if missing
  ansible.builtin.command:
    cmd: ssh-keygen -A
    creates: /etc/ssh/ssh_host_ed25519_key

- name: Enable and start sshd
  ansible.builtin.systemd:
    name: sshd
    enabled: true
    state: started
