---
- name: Install UFW
  ansible.builtin.pacman:
    name: ufw
    state: present

- name: Set UFW default deny incoming
  ansible.builtin.command:
    cmd: ufw default deny incoming
  changed_when: false

- name: Set UFW default allow outgoing
  ansible.builtin.command:
    cmd: ufw default allow outgoing
  changed_when: false

- name: Detect primary network interface
  ansible.builtin.shell:
    cmd: ip route show default | awk '{print $5}' | head -1
  register: primary_interface
  changed_when: false

- name: Allow SSH on primary interface
  ansible.builtin.command:
    cmd: "ufw allow in on {{ primary_interface.stdout }} to any port {{ firewall_ssh_port }} proto tcp"
  changed_when: false

- name: Allow RDP on primary interface (VM only)
  ansible.builtin.command:
    cmd: "ufw allow in on {{ primary_interface.stdout }} to any port {{ firewall_rdp_port }} proto tcp"
  changed_when: false
  when: "'vm' in group_names or hypervisor is defined"

- name: Allow ZeroTier traffic
  ansible.builtin.command:
    cmd: ufw allow in on zt+ to any port {{ firewall_ssh_port }} proto tcp
  changed_when: false
  when: zerotier_network_id | default('') | length > 0

- name: Allow RDP on ZeroTier (VM only)
  ansible.builtin.command:
    cmd: ufw allow in on zt+ to any port {{ firewall_rdp_port }} proto tcp
  changed_when: false
  when:
    - zerotier_network_id | default('') | length > 0
    - "'vm' in group_names or hypervisor is defined"

- name: Enable UFW
  ansible.builtin.command:
    cmd: ufw --force enable
  changed_when: false

- name: Enable UFW service
  ansible.builtin.systemd:
    name: ufw
    enabled: true
    state: started
